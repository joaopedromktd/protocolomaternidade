    <meta charset="UTF-8">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }

<body class="bg-slate-50 text-slate-900">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KLQP4VXX"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                arrowRight: (
                    <>
                        <path d="M5 12h14"/>
                        <path d="m12 5 7 7-7 7"/>
                    </>
                ),
                badgeCheck: (
                    <>
                        <path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/>
                        <path d="m9 12 2 2 4-4"/>
                    </>
                ),
                lock: (
                    <>
                        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </>
                ),
                shieldCheck: (
                    <>
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/><path d="m9 12 2 2 4-4"/>
                    </>
                ),
                star: (
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                ),
                alertCircle: (
                    <>
                        <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
                    </>
                )
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [step, setStep] = useState('start'); 
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const priceRef = useRef(null);

            const pushEvent = (eventName) => {
                if (typeof window !== 'undefined') {
                    window.dataLayer = window.dataLayer || [];
                    window.dataLayer.push({
                        event: eventName,
                        timestamp: new Date().getTime()
                    });
                    console.log("Evento disparado:", eventName);
                }
            };

            const scrollToPrice = () => {
                priceRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            // Hook de Tracking Centralizado
            useEffect(() => {
                if (step === 'result') {
                    // Dispara ambos os eventos quando o lead chega no resultado positivo
                    pushEvent('analiseconcluida');
                    pushEvent('Landingpagevisit');
                }
            }, [step]);

            const quizQuestions = [
                { q: "Qual é a sua situação de trabalho atualmente?", options: ["Sou MEI (tenho CNPJ próprio)", "Trabalho como autônoma / freelancer", "Sou CLT (carteira assinada)", "Estou desempregada mas contribuí para o INSS", "Nunca contribuí para o INSS"] },
                { q: "Qual é a situação do seu filho?", options: ["Estou grávida agora", "Meu filho tem menos de 1 ano", "Meu filho tem entre 1 e 3 anos", "Meu filho tem entre 3 e 5 anos"] },
                { q: "Antes desse quiz, você sabia que tinha direito ao salário maternidade?", options: ["Não fazia ideia que existia esse bemefício", "Sabia que existia mas achei que não me encaixava", "Sabia mas não sei como dar entrada", "Já tentei dar entrada mas o INSS negou"] },
                { q: "O que mais te impede de buscar esse benefício?", options: ["Não tenho dinheiro para pagar um advogado", "Acho que é muito complicado e burocrático", "Tenho medo de o INSS negar", "Não sei quais documentos juntar", "Não sei nem por onde começar"] },
                { q: "Você já tentou dar entrada no salário maternidade antes?", options: ["Nunca tentei, não sabia como", "Fui ao INSS pessoalmente e saí sem resposta", "Pesquisei no Google mas fiquei mais confusa", "O INSS negou e não soube o que fazer", "Um familiar tentou me ajudar mas não conseguiu"] },
                { q: "Como está sua situação financeira agora?", options: ["Estou bem, mas esse dinheiro extra faria diferença", "Está apertada e esse valor resolveria muito", "Está muito difícil e preciso muito desse dinheiro", "Estou endividada e esse beneficio seria essencial"] },
                { q: "Quanto tempo você teria para seguir um passo a passo e dar entrada no processo?", options: ["Menos de 1 hora por dia", "Entre 1 e 2 horas", "Tenho tempo disponível, quero resolver logo", "Quero algo que eu possa fazer no celular mesmo"] },
                { q: "O que você quer fazer com o dinheiro do salário maternidade?", options: ["Quitar dívidas", "Investir nos meus filhos", "Montar uma reserva de emergência", "Pagar contas atrasadas", "Dar uma vida melhor para minha família"] },
                { q: "Se você recebesse o salário maternidade hoje, qual seria a primeira coisa que faria?", options: ["Pagaria as contas que estão me tirando o sono", "Compraria algo que meu filho precisa", "Guardaria como reserva para o futuro"] },
                { q: "Como você se sentiria sabendo que resolveu isso sozinha, sem pagar advogado?", options: ["Aliviada e orgulhosa", "Mais confiante para buscar outros direitos", "Finalmente no controle da minha situação", "Todas as opções acima"] },
                { q: "Em quanto tempo você quer resolver isso?", options: ["Quero começar hoje mesmo", "Essa semana", "Esse mês", "Quando tiver mais tempo"] },
                { q: "O que seria diferente na sua vida com esse dinheiro em mãos?", options: ["Teria menos estresse financeiro", "Meu filho teria mais do que precisa", "Me sentiria mais independente", "Conseguiria respirar e planejar o futuro"] }
            ];

            const handleQuizAnswer = () => {
                // Dispara o evento de página concluída sem espaços
                pushEvent(`pagina${currentQuestion + 1}concluida`);
                
                if (currentQuestion < quizQuestions.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    setStep('analyzing');
                    setTimeout(() => setStep('result'), 3000);
                }
            };

            if (step === 'start') {
                return (
                    <div className="min-h-screen mobile-fit-height bg-slate-50 flex flex-col items-center justify-center p-4">
                        <div className="max-w-2xl w-full bg-white rounded-[40px] shadow-2xl overflow-hidden border border-slate-100 flex flex-col">
                            <div className="bg-red-600 p-6 md:p-8 text-center text-white">
                                <h1 className="text-xl md:text-3xl font-black uppercase mb-4 leading-tight">
                                    Descubra em 2 Minutos Se Você Tem Direito ao Salário Maternidade — e Quanto Pode Receber Ainda Este Ano
                                </h1>
                                <p className="text-red-100 text-sm md:text-lg">
                                    Milhares de mães brasileiras deixam de receber esse dinheiro todo ano simplesmente por não saber que têm direito.
                                </p>
                            </div>
                            <div className="p-6 md:p-12 text-center flex-1">
                                <p className="text-slate-600 mb-6 text-sm md:text-lg font-medium leading-relaxed">
                                    Responda o teste rápido e descubra sua situação agora. Como receber sem advogado, sem complicação.
                                </p>
                                <p className="font-bold text-slate-800 mb-6 text-lg">Pronta para descobrir?</p>
                                <button onClick={() => setStep('quiz')} className="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 md:py-6 rounded-2xl text-[11px] sm:text-sm md:text-xl shadow-xl transition-all transform hover:scale-105 uppercase whitespace-nowrap px-2">
                                    QUERO SABER SE TENHO DIREITO
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (step === 'quiz') {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 py-8">
                        <div className="max-w-xl w-full bg-white rounded-3xl shadow-xl p-6 md:p-8 border border-slate-100 relative">
                            <div className="flex justify-between items-center mb-6">
                                <span className="text-xs font-black text-slate-400 uppercase tracking-widest font-bold">Pergunta {currentQuestion + 1} de {quizQuestions.length}</span>
                                <div className="w-24 md:w-32 bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div className="bg-red-600 h-full transition-all duration-500" style={{ width: `${((currentQuestion + 1) / quizQuestions.length) * 100}%` }}></div>
                                </div>
                            </div>
                            <h2 className="text-lg md:text-2xl font-black text-slate-800 mb-6 leading-tight">{quizQuestions[currentQuestion].q}</h2>
                            {/* A key={currentQuestion} garante que o container seja resetado visualmente a cada pergunta */}
                            <div key={currentQuestion} className="space-y-2 md:space-y-3">
                                {quizQuestions[currentQuestion].options.map((opt, idx) => (
                                    <button key={idx} onClick={handleQuizAnswer} className="w-full text-left p-4 md:p-5 rounded-xl border-2 border-slate-100 hover:border-red-500 hover:bg-red-50 transition-all text-slate-700 font-bold flex justify-between items-center group shadow-sm text-sm md:text-base focus:outline-none focus:ring-2 focus:ring-red-500/20">
                                        {opt}
                                        <Icon name="arrowRight" className="w-4 h-4 md:w-5 md:h-5 text-slate-300 group-hover:text-red-500 transform group-hover:translate-x-1 transition-transform" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            if (step === 'analyzing') {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 text-center">
                        <div className="w-full max-w-md bg-white p-12 rounded-[40px] shadow-2xl">
                            <div className="relative w-16 md:w-24 h-16 md:h-24 mb-8 mx-auto">
                                <div className="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                                <div className="absolute inset-0 border-4 border-red-600 rounded-full border-t-transparent animate-spin"></div>
                            </div>
                            <h2 className="text-xl md:text-2xl font-black text-slate-800 mb-4 leading-tight">Cruzando seus dados com as regras do INSS...</h2>
                            <p className="text-slate-500 animate-pulse text-sm">Aguarde, análise em tempo real.</p>
                        </div>
                    </div>
                );
            }

            if (step === 'result') {
                return (
                    <div className="min-h-screen bg-white">
                        {/* 1. RESULTADO DA ANÁLISE */}
                        <section className="bg-slate-50 py-10 px-4">
                            <div className="max-w-2xl mx-auto bg-white rounded-[32px] md:rounded-[40px] shadow-2xl p-6 md:p-10 border border-slate-100 text-center">
                                <div className="bg-green-100 text-green-700 font-black px-4 py-1 rounded-full text-[10px] md:text-sm inline-block mb-4 uppercase tracking-widest">✅ ANÁLISE CONCLUÍDA.</div>
                                <div className="space-y-4 text-left mb-8">
                                    <p className="text-lg md:text-xl font-bold text-slate-800 leading-tight">Com base nas suas respostas, identificamos que você muito provavelmente tem direito ao Salário Maternidade — e esse valor pode estar esperando por você há meses ou até anos.</p>
                                    <div className="bg-slate-50 p-4 rounded-2xl border-l-4 border-red-600">
                                        <p className="mb-2 text-slate-700 font-medium text-xs md:text-base">O problema não é falta de direito.</p>
                                        <p className="font-black text-slate-900 text-sm md:text-lg leading-tight uppercase italic tracking-tight">O problema é falta de um caminho claro para buscar o que já é seu.</p>
                                    </div>
                                    <p className="text-slate-600 leading-relaxed font-medium text-xs md:text-base">É exatamente por isso que criamos o <span className="font-black text-slate-900">Protocolo Maternidade</span> — um guia passo a passo direto do seu celular.</p>
                                </div>
                                <button onClick={scrollToPrice} className="animate-soft-pulse w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 md:py-6 rounded-2xl text-[11px] sm:text-sm md:text-xl shadow-xl transition-all transform hover:scale-105 uppercase">
                                    QUERO RECEBER MEU ACESSO IMEDIATO
                                </button>
                            </div>
                        </section>

                        {/* 2. 9 EM CADA 10 MÃES */}
                        <section className="py-16 md:py-24 px-4 bg-white border-y border-slate-100">
                            <div className="max-w-3xl mx-auto text-center space-y-6">
                                <h2 className="text-2xl md:text-4xl font-black text-slate-900 leading-tight uppercase italic">9 em cada 10 mães brasileiras que têm direito ao Salário Maternidade nunca receberam.</h2>
                                <p className="text-lg md:text-xl text-slate-600 font-medium leading-relaxed">Não porque o INSS não paga. Mas porque o sistema foi feito para confundir. Esse dinheiro não some — ele fica parado esperando que a mãe saiba como buscar do jeito certo.</p>
                                <div className="bg-red-50 p-6 rounded-2xl border-l-4 border-red-600 text-left">
                                    <p className="text-red-900 font-bold text-sm md:text-lg leading-tight">O direito prescreve em 5 anos. Se seu filho tem menos de 5 anos, cada dia que passa é um dia a menos para buscar o que é seu.</p>
                                </div>
                            </div>
                        </section>

                        {/* 3. O QUE VOCÊ GANHA */}
                        <section className="py-16 md:py-24 px-4 bg-slate-50">
                            <div className="max-w-3xl mx-auto">
                                <h2 className="text-2xl md:text-4xl font-black text-center mb-12 uppercase italic leading-tight">O Que Você Ganha Com o Protocolo Maternidade</h2>
                                <div className="grid grid-cols-1 gap-3">
                                    {[
                                        "Descobre em minutos se você tem direito",
                                        "Segue um caminho claro sem precisar de advogado",
                                        "Economiza até R$3.000 em honorários",
                                        "Sabe exatamente quais documentos juntar",
                                        "Aprende o que fazer se o INSS negar",
                                        "Resolve tudo em 2 horas, direto do celular",
                                        "Garante que não vai perder o prazo de 5 anos"
                                    ].map((v, i) => (
                                        <div key={i} className="flex gap-3 items-center bg-white p-4 rounded-xl border border-slate-200 shadow-sm transition-transform hover:translate-x-1">
                                            <Icon name="badgeCheck" className="text-green-600 w-6 h-6 shrink-0" />
                                            <span className="text-slate-700 font-bold text-sm md:text-lg uppercase tracking-tight">{v}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* 4. OFERTA IRRESISTÍVEL */}
                        <section ref={priceRef} className="py-16 md:py-32 px-4 bg-slate-900 text-white relative overflow-hidden">
                            <div className="max-w-4xl mx-auto text-center relative z-10">
                                <h2 className="text-2xl md:text-6xl font-black mb-10 uppercase italic tracking-tighter leading-tight">Garanta Seu Protocolo Maternidade Agora</h2>
                                <div className="bg-white text-slate-900 rounded-[32px] md:rounded-[64px] p-6 md:p-16 mb-6 shadow-2xl border-x-[12px] border-red-600">
                                    <div className="bg-red-600 text-white px-8 py-2 rounded-full font-black text-xs md:text-xl uppercase mb-8 animate-pulse inline-block tracking-widest shadow-xl shadow-red-200">⚠️ Oferta Black Friday — Tempo Limitado</div>
                                    
                                    <div className="text-left space-y-3 mb-10 max-w-sm mx-auto font-medium text-sm md:text-xl">
                                        <div className="flex justify-between border-b-2 border-slate-50 pb-2"><span>📘 E-book Protocolo</span><span className="font-bold text-slate-400">R$97</span></div>
                                        <div className="flex justify-between border-b-2 border-slate-50 pb-2"><span>📋 Checklist Bônus</span><span className="font-bold text-slate-400">R$37</span></div>
                                        <div className="flex justify-between border-b-2 border-slate-50 pb-2"><span>📝 Modelo Contestação</span><span className="font-bold text-slate-400">R$67</span></div>
                                        <div className="flex justify-between border-b-2 border-slate-50 pb-2"><span>📱 Guia Celular</span><span className="font-bold text-slate-400">R$27</span></div>
                                        <div className="flex justify-between pt-4 font-black text-red-600 italic text-xl md:text-2xl"><span>Valor Total:</span><span className="line-through text-slate-300 text-sm">R$228</span></div>
                                    </div>

                                    <div className="mb-8">
                                        <p className="text-slate-500 text-sm md:text-3xl font-bold uppercase tracking-widest mb-2">De R$97 por apenas</p>
                                        <p className="text-6xl md:text-9xl font-black text-slate-950 my-4 tracking-tighter leading-none">R$27,90</p>
                                        <p className="text-lg md:text-4xl font-black text-red-600 uppercase italic tracking-wide">ou 3x de R$9,97 sem juros</p>
                                    </div>

                                    <div className="space-y-4 text-center text-slate-600 text-[11px] md:text-lg mb-8 max-w-xl mx-auto leading-relaxed font-medium italic border-t border-slate-100 pt-6">
                                        <p>O teto do Salário Maternidade subiu em 2026.</p>
                                        <p>Seu filho está crescendo. O prazo de 5 anos não para. Busque o que já é seu.</p>
                                    </div>

                                    <a href="https://hub.la/r/salariomaternidade" target="_blank" className="animate-soft-pulse block w-full bg-green-600 hover:bg-green-700 text-white font-black text-base md:text-3xl py-6 md:py-10 rounded-[24px] md:rounded-[48px] shadow-2xl uppercase transition-transform hover:scale-105 flex items-center justify-center text-center">
                                        QUERO RECEBER MEU ACESSO IMEDIATO
                                    </a>

                                    <div className="flex items-center justify-center gap-4 mt-8 text-slate-400">
                                        <div className="flex items-center gap-2"><Icon name="lock" className="w-4 h-4" /> <span className="text-[10px] md:text-xs font-black uppercase tracking-widest">Pagamento 100% seguro</span></div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* 5. GARANTIA */}
                        <section className="py-20 md:py-32 px-4 bg-white border-t border-slate-100 text-center">
                            <div className="max-w-4xl mx-auto">
                                <div className="bg-slate-50 p-10 md:p-20 rounded-[48px] md:rounded-[80px] mb-24 border border-slate-200">
                                    <Icon name="shieldCheck" className="w-24 md:w-40 h-24 md:h-40 text-red-600 mx-auto mb-6" />
                                    <h2 className="text-3xl md:text-5xl font-black text-slate-950 mb-8 uppercase italic leading-tight">Garantia Incondicional de 7 Dias</h2>
                                    <div className="space-y-6 text-slate-700 text-lg md:text-2xl leading-relaxed font-medium italic">
                                        <p>Você tem 7 dias completos para testar o Protocolo Maternidade. Se não gostar, devolvemos 100% do valor imediatamente.</p>
                                        <p className="font-black text-slate-900 bg-red-50 p-4 inline-block not-italic border-l-8 border-red-600">A gente só pede uma coisa: que você tente.</p>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* 6. O QUE AS MÃES ESTÃO FALANDO */}
                        <section className="py-16 md:py-24 px-4 bg-slate-50">
                            <div className="max-w-4xl mx-auto">
                                <h2 className="text-2xl md:text-4xl font-black text-center mb-16 uppercase italic text-slate-900">O que as mães estão falando:</h2>
                                <div className="space-y-6">
                                    {[
                                        { text: "Meu filho tinha 4 anos e 8 meses quando comprei o Protocolo. Achei que tinha perdido o prazo. Recebi R$6.800. Chorei muito.", name: "Rosana F., diarista, Goiânia" },
                                        { text: "O INSS sempre dava erro ou negava. Com o Protocolo entendi onde estava errando. Na quarta tentativa deu certo. R$9.100 na conta.", name: "Juliana C., autônoma, Porto Alegre" },
                                        { text: "Sou MEI e todo mundo me dizia que eu não tinha direito. O Protocolo mostrou que eu tinha sim. Processo aprovado em 18 dias.", name: "Tatiana B., MEI, Curitiba" }
                                    ].map((t, i) => (
                                        <div key={i} className="bg-white p-8 rounded-[32px] border border-slate-100 shadow-lg flex flex-col md:flex-row gap-6 md:items-center text-left">
                                            <div className="shrink-0 flex gap-1">
                                                {[...Array(5)].map((_, j) => <Icon key={j} name="star" className="w-5 h-5 text-amber-500 fill-amber-500" />)}
                                            </div>
                                            <div className="flex-1">
                                                <p className="text-slate-700 text-base md:text-lg italic font-medium leading-relaxed">"{t.text}"</p>
                                                <p className="text-slate-950 font-black text-xs uppercase tracking-widest mt-4">— {t.name}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        <footer className="py-20 bg-slate-950 text-center text-slate-500 px-4">
                            <p className="font-bold uppercase tracking-widest text-xs mb-6">© 2026 Protocolo Maternidade. Todos os direitos reservados.</p>
                            <p className="text-[10px] max-w-2xl mx-auto uppercase leading-relaxed opacity-50">Não somos afiliados ao INSS ou Governo Federal. Este é um guia informativo para auxiliar mães na busca por seus direitos.</p>
                        </footer>
                    </div>
                );
            }

            return null; // Fallback
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
