<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Maternidade - O INSS Te Deve Dinheiro</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para processar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Smooth Scroll */
        html { scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Componente de Ícones SVG Internos (Corrigido com Fragmentos)
        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                target: (
                    <>
                        <path d="M12 13a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"/>
                        <path d="M4 12a8 8 0 1 0 16 0 8 8 0 0 0-16 0Z"/>
                        <path d="M12 2v2"/>
                        <path d="M12 20v2"/>
                        <path d="M20 12h2"/>
                        <path d="M2 12h2"/>
                    </>
                ),
                arrowRight: (
                    <>
                        <path d="M5 12h14"/>
                        <path d="m12 5 7 7-7 7"/>
                    </>
                ),
                badgeCheck: (
                    <>
                        <path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/>
                        <path d="m9 12 2 2 4-4"/>
                    </>
                ),
                lock: (
                    <>
                        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </>
                ),
                shieldCheck: (
                    <>
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>
                        <path d="m9 12 2 2 4-4"/>
                    </>
                ),
                star: (
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                ),
                chevronDown: (
                    <path d="m6 9 6 6 6-6"/>
                ),
                chevronUp: (
                    <path d="m18 15-6-6-6 6"/>
                ),
                alertCircle: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" x2="12" y1="8" y2="12"/>
                        <line x1="12" x2="12.01" y1="16" y2="16"/>
                    </>
                )
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [step, setStep] = useState('start'); 
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [openFaq, setOpenFaq] = useState(null);
            const priceRef = useRef(null);

            const pushEvent = (eventName) => {
                if (typeof window !== 'undefined') {
                    window.dataLayer = window.dataLayer || [];
                    window.dataLayer.push({
                        event: eventName,
                        timestamp: new Date().getTime()
                    });
                }
            };

            const scrollToPrice = () => {
                priceRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                if (step === 'sales') {
                    pushEvent('landingpage visit');
                }
            }, [step]);

            const quizQuestions = [
                { q: "Qual é a sua situação de trabalho atualmente?", options: ["Sou MEI (tenho CNPJ próprio)", "Trabalho como autônoma / freelancer", "Sou CLT (carteira assinada)", "Estou desempregada mas contribuí para o INSS", "Nunca contribuí para o INSS"] },
                { q: "Qual é a situação do seu filho?", options: ["Estou grávida agora", "Meu filho tem menos de 1 ano", "Meu filho tem entre 1 e 3 anos", "Meu filho tem entre 3 e 5 anos"] },
                { q: "Antes desse quiz, você sabia que tinha direito ao salário maternidade?", options: ["Não fazia ideia que existia esse benefício", "Sabia que existia mas achei que não me encaixava", "Sabia mas não sei como dar entrada", "Já tentei dar entrada mas o INSS negou"] },
                { q: "O que mais te impede de buscar esse benefício?", options: ["Não tenho dinheiro para pagar um advogado", "Acho que é muito complicado e burocrático", "Tenho medo de o INSS negar", "Não sei quais documentos juntar", "Não sei nem por onde começar"] },
                { q: "Você já tentou dar entrada no salário maternidade antes?", options: ["Nunca tentei, não sabia como", "Fui ao INSS pessoalmente e saí sem resposta", "Pesquisei no Google mas fiquei mais confusa", "O INSS negou e não soube o que fazer", "Um familiar tentou me ajudar mas não conseguiu"] },
                { q: "Como está sua situação financeira agora?", options: ["Estou bem, mas esse dinheiro extra faria diferença", "Está apertada e esse valor resolveria muito", "Está muito difícil e preciso muito desse dinheiro", "Estou endividada e esse beneficio seria essencial"] },
                { q: "Quanto tempo você teria para seguir um passo a passo e dar entrada no processo?", options: ["Menos de 1 hora por dia", "Entre 1 e 2 horas", "Tenho tempo disponível, quero resolver logo", "Quero algo que eu possa fazer no celular mesmo"] },
                { q: "O que você quer fazer com o dinheiro do salário maternidade?", options: ["Quitar dívidas", "Investir nos meus filhos", "Montar uma reserva de emergência", "Pagar contas atrasadas", "Dar uma vida melhor para minha família"] },
                { q: "Se você recebesse o salário maternidade hoje, qual seria a primeira coisa que faria?", options: ["Pagaria as contas que estão me tirando o sono", "Compraria algo que meu filho precisa", "Guardaria como reserva para o futuro"] },
                { q: "Como você se sentiria sabendo que resolveu isso sozinha, sem pagar advogado?", options: ["Aliviada e orgulhosa", "Mais confiante para buscar outros direitos", "Finalmente no controle da minha situação", "Todas as opções acima"] },
                { q: "Em quanto tempo você quer resolver isso?", options: ["Quero começar hoje mesmo", "Essa semana", "Esse mês", "Quando tiver mais tempo"] },
                { q: "O que seria diferente na sua vida com esse dinheiro em mãos?", options: ["Teria menos estresse financeiro", "Meu filho teria mais do que precisa", "Me sentiria mais independente", "Conseguiria respirar e planejar o futuro"] }
            ];

            const handleQuizAnswer = () => {
                pushEvent(`Pagina ${currentQuestion + 1} concluida`);
                if (currentQuestion < quizQuestions.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    setStep('analyzing');
                    setTimeout(() => setStep('result'), 3000);
                }
            };

            const handleFinalResultClick = () => {
                pushEvent('analise concluida');
                setStep('sales');
                window.scrollTo({ top: 0 });
            };

            if (step === 'start') {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 text-slate-900">
                        <div className="max-w-2xl w-full bg-white rounded-[40px] shadow-2xl overflow-hidden border border-slate-100">
                            <div className="bg-red-600 p-8 text-center text-white">
                                <Icon name="target" className="w-16 h-16 mx-auto mb-4" />
                                <h1 className="text-2xl md:text-3xl font-black uppercase mb-4 leading-tight">
                                    Descubra em 2 Minutos Se Você Tem Direito ao Salário Maternidade — e Quanto Pode Receber Ainda Este Ano
                                </h1>
                                <p className="text-red-100 text-lg">
                                    Milhares de mães brasileiras deixam de receber esse dinheiro todo ano simplesmente por não saber que têm direito. Responda o teste rápido e descubra sua situação agora.
                                </p>
                            </div>
                            <div className="p-8 md:p-12 text-center">
                                <p className="text-slate-600 mb-8 text-lg font-medium">
                                    Responda as próximas perguntas para descobrir se o INSS te deve dinheiro — e como receber sem precisar de advogado, sem complicação.
                                </p>
                                <p className="font-bold text-slate-800 mb-8 text-xl">Pronta para descobrir?</p>
                                <button onClick={() => setStep('quiz')} className="w-full bg-green-600 hover:bg-green-700 text-white font-black py-6 rounded-2xl text-xl shadow-xl shadow-green-100 transition-all transform hover:scale-105 uppercase">
                                    Quero Saber Se Tenho Direito
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (step === 'quiz') {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 py-12 text-slate-900">
                        <div className="max-w-xl w-full bg-white rounded-3xl shadow-xl p-8 border border-slate-100 relative">
                            <div className="flex justify-between items-center mb-8">
                                <span className="text-xs font-black text-slate-400 uppercase tracking-widest font-bold">Pergunta {currentQuestion + 1} de {quizQuestions.length}</span>
                                <div className="w-32 bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div className="bg-red-600 h-full transition-all duration-500" style={{ width: `${((currentQuestion + 1) / quizQuestions.length) * 100}%` }}></div>
                                </div>
                            </div>
                            <h2 className="text-xl md:text-2xl font-black text-slate-800 mb-8 leading-tight">{quizQuestions[currentQuestion].q}</h2>
                            <div className="space-y-3">
                                {quizQuestions[currentQuestion].options.map((opt, idx) => (
                                    <button key={idx} onClick={handleQuizAnswer} className="w-full text-left p-5 rounded-xl border-2 border-slate-100 hover:border-red-500 hover:bg-red-50 transition-all text-slate-700 font-bold flex justify-between items-center group shadow-sm">
                                        {opt}
                                        <Icon name="arrowRight" className="w-5 h-5 text-slate-300 group-hover:text-red-500 transform group-hover:translate-x-1 transition-transform" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            if (step === 'analyzing') {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 text-center text-slate-900">
                        <div className="w-full max-w-md bg-white p-12 rounded-[40px] shadow-2xl">
                            <div className="relative w-24 h-24 mb-8 mx-auto">
                                <div className="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                                <div className="absolute inset-0 border-4 border-red-600 rounded-full border-t-transparent animate-spin"></div>
                            </div>
                            <h2 className="text-2xl font-black text-slate-800 mb-4">Cruzando seus dados com as regras do INSS...</h2>
                            <p className="text-slate-500 animate-pulse">Aguarde, análise em tempo real.</p>
                        </div>
                    </div>
                );
            }

            if (step === 'result') {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 text-center text-slate-900">
                        <div className="max-w-2xl w-full bg-white rounded-[40px] shadow-2xl p-8 md:p-12 border border-slate-100">
                            <div className="bg-green-100 text-green-700 font-black px-4 py-2 rounded-full text-sm inline-block mb-6 uppercase tracking-widest font-bold">✅ Análise concluída.</div>
                            <div className="space-y-6 text-left mb-10">
                                <p className="text-xl font-bold text-slate-800 leading-tight">Com base nas suas respostas, identificamos que você muito provavelmente tem direito ao Salário Maternidade — e esse valor pode estar esperando por você há meses ou até anos.</p>
                                <div className="bg-slate-50 p-6 rounded-2xl border-l-4 border-red-600">
                                    <p className="mb-4 text-slate-700 font-medium">O problema não é falta de direito.</p>
                                    <p className="font-black text-slate-900">O problema é falta de um caminho claro para buscar o que já é seu.</p>
                                </div>
                                <p className="text-slate-600 leading-relaxed font-medium">É exatamente por isso que criamos o <span className="font-black">Protocolo Maternidade</span> — um guia passo a passo que mostra exatamente o que fazer. Sem advogado. Sem complicação. Direto do seu celular.</p>
                            </div>
                            <button onClick={handleFinalResultClick} className="w-full bg-green-600 hover:bg-green-700 text-white font-black py-8 rounded-3xl text-2xl shadow-xl shadow-green-100 transition-all transform hover:scale-105 uppercase">
                                Quero o Protocolo Maternidade Agora
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-white text-slate-900">
                    <section className="bg-gradient-to-b from-red-700 to-red-800 text-white py-16 px-4">
                        <div className="max-w-4xl mx-auto text-center">
                            <span className="bg-red-500/30 text-red-100 px-4 py-1 rounded-full text-sm font-black tracking-wider uppercase mb-6 inline-block tracking-widest font-bold">Atenção: Acesso Restrito</span>
                            <h1 className="text-4xl md:text-6xl font-black mb-6 leading-tight uppercase tracking-tighter">O INSS Te Deve Dinheiro — E Você Nem Sabe</h1>
                            <p className="text-lg md:text-xl text-red-100 mb-8 max-w-3xl mx-auto font-medium">Descubra como receber o Salário Maternidade que é seu por direito, do zero ao depósito na conta, sem advogado — mesmo que o INSS já tenha negado antes.</p>
                            
                            <div className="bg-white p-8 rounded-[32px] border-4 border-red-500 inline-block text-left max-w-2xl shadow-2xl transform hover:scale-[1.02] transition-transform text-slate-900 mt-6">
                                <div className="flex items-start gap-4">
                                    <div className="shrink-0 mt-1"><Icon name="badgeCheck" className="w-8 h-8 text-green-600" /></div>
                                    <p className="text-lg md:text-xl font-bold leading-relaxed">De acordo com as suas respostas no quiz… Identificamos que você se enquadra no perfil de mães que têm direito ao benefício e ainda estão dentro do prazo legal de 5 anos para solicitar. O que você vai ver agora foi preparado especialmente para a sua situação.</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="py-20 px-4 bg-white">
                        <div className="max-w-3xl mx-auto space-y-6 text-xl text-slate-700 font-medium leading-relaxed">
                            <p className="font-black text-3xl text-slate-900 leading-tight">9 em cada 10 mães brasileiras que têm direito ao Salário Maternidade nunca receberam.</p>
                            <p>A verdade é uma só: <span className="bg-yellow-200 px-2 text-slate-900 font-black">esse dinheiro já é seu.</span> Ele só precisa ser buscado do jeito certo.</p>
                            <div className="mt-12 text-center">
                                <button onClick={scrollToPrice} className="w-full md:w-auto bg-green-600 hover:bg-green-700 text-white font-black text-xl py-7 px-12 rounded-[32px] shadow-2xl uppercase transition-transform hover:scale-105">
                                    Quero Receber o Que É Meu — Acesso Imediato
                                </button>
                            </div>
                        </div>
                    </section>

                    <section className="py-20 px-4 bg-slate-50">
                        <div className="max-w-5xl mx-auto">
                            <h2 className="text-3xl font-black text-center mb-16 italic text-slate-800 uppercase leading-tight">Isso não é teoria. É o que acontece quando a mãe tem o caminho certo:</h2>
                            <div className="grid md:grid-cols-3 gap-8 mb-16">
                                {[
                                    { name: "Fernanda S.", initials: "FS", text: "Eu tinha desistido. Fui ao INSS duas vezes e não entendia nada. Recebi R$7.200 que nem sabia que existiam." },
                                    { name: "Camila R.", initials: "CR", text: "Minha filha já tinha 4 anos e eu achei que tinha perdido o prazo. Foi mais simples do que eu imaginava." },
                                    { name: "Patrícia M.", initials: "PM", text: "O INSS tinha negado. Achei que era o fim. O Protocolo explica o que fazer — contestei e recebi." }
                                ].map((t, i) => (
                                    <div key={i} className="bg-white p-8 rounded-[40px] shadow-xl border border-slate-100 flex flex-col justify-between">
                                        <p className="text-slate-600 italic mb-10 leading-relaxed font-medium">"{t.text}"</p>
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center font-black text-red-600 shadow-inner">{t.initials}</div>
                                            <p className="font-black text-slate-800 uppercase tracking-tighter">{t.name}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <section ref={priceRef} className="py-24 px-4 bg-slate-900 text-white relative overflow-hidden">
                        <div className="max-w-4xl mx-auto text-center relative z-10">
                            <h2 className="text-4xl md:text-5xl font-black mb-16 uppercase italic tracking-tighter leading-tight">Garanta Seu Protocolo Maternidade Agora</h2>
                            <div className="bg-white text-slate-900 rounded-[64px] p-8 md:p-16 mb-12 shadow-2xl border-x-[12px] border-red-600">
                                <div className="bg-red-600 text-white px-10 py-3 rounded-full font-black text-lg uppercase mb-12 animate-pulse inline-block tracking-widest font-bold">⚠️ Oferta Black Friday — Por tempo limitado</div>
                                <div className="mb-16">
                                    <p className="text-slate-500 text-2xl font-bold uppercase tracking-widest">De R$97 por apenas</p>
                                    <p className="text-7xl md:text-8xl font-black text-slate-950 my-4 tracking-tighter">R$27,90</p>
                                    <p className="text-3xl font-black text-red-600 uppercase italic">ou 3x de R$9,97 sem juros</p>
                                </div>
                                <a href="https://instagram.com/joaopedromktd" target="_blank" className="block w-full bg-green-600 hover:bg-green-700 text-white font-black text-2xl md:text-3xl py-10 rounded-[40px] shadow-2xl uppercase transition-transform hover:scale-105 flex items-center justify-center text-center">
                                    Quero o Protocolo Maternidade Agora
                                </a>
                                <div className="flex flex-col md:flex-row items-center justify-center gap-8 mt-12 text-slate-400">
                                    <div className="flex items-center gap-2"><Icon name="lock" className="w-5 h-5" /> <span className="text-xs font-black uppercase tracking-widest font-bold">Pagamento 100% seguro</span></div>
                                    <div className="flex items-center gap-2"><Icon name="shieldCheck" className="w-5 h-5" /> <span className="text-xs font-black uppercase tracking-widest font-bold">Acesso imediato</span></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <section className="py-24 px-4 bg-white border-t border-slate-100">
                        <div className="max-w-4xl mx-auto text-center">
                            <h2 className="text-4xl font-black text-slate-900 mb-16 uppercase italic leading-tight">Dúvidas Frequentes</h2>
                            <div className="space-y-4 text-left max-w-3xl mx-auto">
                                {[
                                    { q: "Funciona para MEI, autônoma e desempregada?", a: "Sim. O Protocolo foi criado exatamente para todas as situações — inclusive as que as pessoas acham que não têm direito." },
                                    { q: "E se meu filho já tiver mais de 1 ano?", a: "O prazo legal é de até 5 anos após o nascimento. Você ainda está a tempo de solicitar se seu filho tem menos de 5 anos." },
                                    { q: "O INSS já negou antes. Vale tentar?", a: "Vale muito. Uma negativa não é definitiva e o Protocolo te ensina a contestar e reverter a decisão." }
                                ].map((faq, i) => (
                                    <div key={i} className="border-2 border-slate-50 rounded-[28px] overflow-hidden">
                                        <button onClick={() => setOpenFaq(openFaq === i ? null : i)} className="w-full flex justify-between items-center p-8 text-left font-black text-slate-800 hover:bg-slate-50 transition-colors uppercase text-sm leading-tight">
                                            {faq.q}
                                            <Icon name={openFaq === i ? "chevronUp" : "chevronDown"} className="w-6 h-6 text-slate-400" />
                                        </button>
                                        {openFaq === i && <div className="p-8 pt-0 text-slate-600 border-t-2 border-slate-50 text-lg font-medium leading-relaxed">{faq.a}</div>}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <footer className="py-16 bg-slate-950 text-center text-slate-500 px-4">
                        <p className="font-bold uppercase tracking-widest text-xs mb-4">© 2025 Protocolo Maternidade. Todos os direitos reservados.</p>
                        <p className="text-[10px] max-w-2xl mx-auto uppercase leading-relaxed opacity-50 font-medium">Não somos afiliados ao INSS ou Governo Federal. Este é um guia passo a passo informativo para auxiliar mães na busca por seus direitos.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
