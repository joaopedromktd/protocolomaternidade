<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Google Tag Manager -->
    <script>(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-KLQP4VXX');</script>
    <!-- End Google Tag Manager -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Maternidade - O INSS Te Deve Dinheiro</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para processar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Smooth Scroll */
        html { scroll-behavior: smooth; }
        
        /* Ajustes Mobile Específicos */
        @media (max-width: 640px) {
            .mobile-fit-height {
                min-height: 100dvh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                padding: 1rem;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-KLQP4VXX"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                arrowRight: (
                    <>
                        <path d="M5 12h14"/>
                        <path d="m12 5 7 7-7 7"/>
                    </>
                ),
                badgeCheck: (
                    <>
                        <path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/>
                        <path d="m9 12 2 2 4-4"/>
                    </>
                ),
                lock: (
                    <>
                        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </>
                ),
                shieldCheck: (
                    <>
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/><path d="m9 12 2 2 4-4"/>
                    </>
                ),
                star: (
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                ),
                chevronDown: (
                    <path d="m6 9 6 6 6-6"/>
                ),
                chevronUp: (
                    <path d="m18 15-6-6-6 6"/>
                ),
                alertCircle: (
                    <>
                        <circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/>
                    </>
                ),
                fileText: (
                    <>
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/>
                    </>
                ),
                smartphone: (
                    <>
                        <rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/>
                    </>
                ),
                checkSquare: (
                    <>
                        <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                    </>
                ),
                xCircle: (
                    <>
                        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
                    </>
                )
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [step, setStep] = useState('start'); 
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [openFaq, setOpenFaq] = useState(null);
            const priceRef = useRef(null);

            const pushEvent = (eventName) => {
                if (typeof window !== 'undefined') {
                    window.dataLayer = window.dataLayer || [];
                    window.dataLayer.push({
                        event: eventName,
                        timestamp: new Date().getTime()
                    });
                }
            };

            const scrollToPrice = () => {
                priceRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                if (step === 'sales') {
                    pushEvent('landingpage visit');
                }
            }, [step]);

            const quizQuestions = [
                { q: "Qual é a sua situação de trabalho atualmente?", options: ["Sou MEI (tenho CNPJ próprio)", "Trabalho como autônoma / freelancer", "Sou CLT (carteira assinada)", "Estou desempregada mas contribuí para o INSS", "Nunca contribuí para o INSS"] },
                { q: "Qual é a situação do seu filho?", options: ["Estou grávida agora", "Meu filho tem menos de 1 ano", "Meu filho tem entre 1 e 3 anos", "Meu filho tem entre 3 e 5 anos"] },
                { q: "Antes desse quiz, você sabia que tinha direito ao salário maternidade?", options: ["Não fazia ideia que existia esse benefício", "Sabia que existia mas achei que não me encaixava", "Sabia mas não sei como dar entrada", "Já tentei dar entrada mas o INSS negou"] },
                { q: "O que mais te impede de buscar esse benefício?", options: ["Não tenho dinheiro para pagar um advogado", "Acho que é muito complicado e burocrático", "Tenho medo de o INSS negar", "Não sei quais documentos juntar", "Não sei nem por onde começar"] },
                { q: "Você já tentou dar entrada no salário maternidade antes?", options: ["Nunca tentei, não sabia como", "Fui ao INSS pessoalmente e saí sem resposta", "Pesquisei no Google mas fiquei mais confusa", "O INSS negou e não soube o que fazer", "Um familiar tentou me ajudar mas não conseguiu"] },
                { q: "Como está sua situação financeira agora?", options: ["Estou bem, mas esse dinheiro extra faria diferença", "Está apertada e esse valor resolveria muito", "Está muito difícil e preciso muito desse dinheiro", "Estou endividada e esse beneficio seria essencial"] },
                { q: "Quanto tempo você teria para seguir um passo a passo e dar entrada no processo?", options: ["Menos de 1 hora por dia", "Entre 1 e 2 horas", "Tenho tempo disponível, quero resolver logo", "Quero algo que eu possa fazer no celular mesmo"] },
                { q: "O que você quer fazer com o dinheiro do salário maternidade?", options: ["Quitar dívidas", "Investir nos meus filhos", "Montar uma reserva de emergência", "Pagar contas atrasadas", "Dar uma vida melhor para minha família"] },
                { q: "Se você recebesse o salário maternidade hoje, qual seria a primeira coisa que faria?", options: ["Pagaria as contas que estão me tirando o sono", "Compraria algo que meu filho precisa", "Guardaria como reserva para o futuro"] },
                { q: "Como você se sentiria sabendo que resolveu isso sozinha, sem pagar advogado?", options: ["Aliviada e orgulhosa", "Mais confiante para buscar outros direitos", "Finalmente no controle da minha situação", "Todas as opções acima"] },
                { q: "Em quanto tempo você quer resolver isso?", options: ["Quero começar hoje mesmo", "Essa semana", "Esse mês", "Quando tiver mais tempo"] },
                { q: "O que seria diferente na sua vida com esse dinheiro em mãos?", options: ["Teria menos estresse financeiro", "Meu filho teria mais do que precisa", "Me sentiria mais independente", "Conseguiria respirar e planejar o futuro"] }
            ];

            const handleQuizAnswer = () => {
                pushEvent(`Pagina ${currentQuestion + 1} concluida`);
                if (currentQuestion < quizQuestions.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    setStep('analyzing');
                    setTimeout(() => setStep('result'), 3000);
                }
            };

            const handleFinalResultClick = () => {
                pushEvent('analise concluida');
                setStep('sales');
                window.scrollTo({ top: 0 });
            };

            if (step === 'start') {
                return (
                    <div className="min-h-screen mobile-fit-height bg-slate-50 flex flex-col items-center justify-center p-4">
                        <div className="max-w-2xl w-full bg-white rounded-[40px] shadow-2xl overflow-hidden border border-slate-100 flex flex-col">
                            <div className="bg-red-600 p-6 md:p-8 text-center text-white">
                                <h1 className="text-xl md:text-3xl font-black uppercase mb-4 leading-tight">
                                    Descubra em 2 Minutos Se Você Tem Direito ao Salário Maternidade — e Quanto Pode Receber Ainda Este Ano
                                </h1>
                                <p className="text-red-100 text-sm md:text-lg">
                                    Milhares de mães brasileiras deixam de receber esse dinheiro todo ano simplesmente por não saber que têm direito. Responda o teste rápido e descubra sua situação agora.
                                </p>
                            </div>
                            <div className="p-6 md:p-12 text-center">
                                <p className="text-slate-600 mb-6 text-sm md:text-lg font-medium">
                                    Responda as próximas perguntas para descobrir se o INSS te deve dinheiro — e como receber sem precisar de advogado, sem complicação.
                                </p>
                                <p className="font-bold text-slate-800 mb-6 text-lg">Pronta para descobrir?</p>
                                <button onClick={() => setStep('quiz')} className="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 md:py-6 rounded-2xl text-[11px] sm:text-sm md:text-xl shadow-xl transition-all transform hover:scale-105 uppercase whitespace-nowrap px-2">
                                    QUERO SABER SE TENHO DIREITO
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (step === 'quiz') {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 py-8">
                        <div className="max-w-xl w-full bg-white rounded-3xl shadow-xl p-6 md:p-8 border border-slate-100 relative">
                            <div className="flex justify-between items-center mb-6">
                                <span className="text-xs font-black text-slate-400 uppercase tracking-widest font-bold">Pergunta {currentQuestion + 1} de {quizQuestions.length}</span>
                                <div className="w-24 md:w-32 bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div className="bg-red-600 h-full transition-all duration-500" style={{ width: `${((currentQuestion + 1) / quizQuestions.length) * 100}%` }}></div>
                                </div>
                            </div>
                            <h2 className="text-lg md:text-2xl font-black text-slate-800 mb-6 leading-tight">{quizQuestions[currentQuestion].q}</h2>
                            <div className="space-y-2 md:space-y-3">
                                {quizQuestions[currentQuestion].options.map((opt, idx) => (
                                    <button key={idx} onClick={handleQuizAnswer} className="w-full text-left p-4 md:p-5 rounded-xl border-2 border-slate-100 hover:border-red-500 hover:bg-red-50 transition-all text-slate-700 font-bold flex justify-between items-center group shadow-sm text-sm md:text-base">
                                        {opt}
                                        <Icon name="arrowRight" className="w-4 h-4 md:w-5 md:h-5 text-slate-300 group-hover:text-red-500 transform group-hover:translate-x-1 transition-transform" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            if (step === 'analyzing') {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 text-center">
                        <div className="w-full max-w-md bg-white p-12 rounded-[40px] shadow-2xl">
                            <div className="relative w-16 md:w-24 h-16 md:h-24 mb-8 mx-auto">
                                <div className="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                                <div className="absolute inset-0 border-4 border-red-600 rounded-full border-t-transparent animate-spin"></div>
                            </div>
                            <h2 className="text-xl md:text-2xl font-black text-slate-800 mb-4 leading-tight">Cruzando seus dados com as regras do INSS...</h2>
                            <p className="text-slate-500 animate-pulse text-sm">Aguarde, análise em tempo real.</p>
                        </div>
                    </div>
                );
            }

            if (step === 'result') {
                return (
                    <div className="min-h-screen mobile-fit-height bg-slate-50 flex flex-col items-center justify-center p-4 text-center">
                        <div className="max-w-2xl w-full bg-white rounded-[32px] md:rounded-[40px] shadow-2xl p-6 md:p-10 border border-slate-100">
                            <div className="bg-green-100 text-green-700 font-black px-4 py-1 rounded-full text-[10px] md:text-sm inline-block mb-4 uppercase tracking-widest">✅ ANÁLISE CONCLUÍDA.</div>
                            <div className="space-y-4 text-left mb-6">
                                <p className="text-lg md:text-xl font-bold text-slate-800 leading-tight">Com base nas suas respostas, identificamos que você muito provavelmente tem direito ao Salário Maternidade — e esse valor pode estar esperando por você há meses ou até anos.</p>
                                <div className="bg-slate-50 p-4 rounded-2xl border-l-4 border-red-600">
                                    <p className="mb-2 text-slate-700 font-medium text-xs md:text-base">O problema não é falta de direito.</p>
                                    <p className="font-black text-slate-900 text-sm md:text-lg leading-tight">O problema é falta de um caminho claro para buscar o que já é seu.</p>
                                </div>
                                <p className="text-slate-600 leading-relaxed font-medium text-xs md:text-base">É exatamente por isso que criamos o <span className="font-black text-slate-900">Protocolo Maternidade</span> — um guia passo a passo que mostra exatamente o que fazer. Sem advogado. Sem complicação. Direto do seu celular.</p>
                                <div className="bg-red-50 p-3 rounded-xl flex gap-3 items-start">
                                    <Icon name="alertCircle" className="text-red-600 w-4 h-4 shrink-0 mt-0.5" />
                                    <p className="text-[10px] md:text-xs text-red-900 leading-tight font-medium">O prazo prescreve em 5 anos. Se seu filho tem menos de 5 anos, você ainda está a tempo.</p>
                                </div>
                            </div>
                            <button onClick={handleFinalResultClick} className="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 md:py-6 rounded-2xl text-[11px] sm:text-xs md:text-xl shadow-xl transition-all transform hover:scale-105 uppercase whitespace-nowrap px-1">
                                QUERO O PROTOCOLO MATERNIDADE AGORA
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-white">
                    {/* BLOCO 1 — HEADLINE */}
                    <section className="bg-gradient-to-b from-red-700 to-red-800 text-white py-12 md:py-20 px-4">
                        <div className="max-w-4xl mx-auto text-center">
                            <span className="bg-red-500/30 text-red-100 px-4 py-1 rounded-full text-xs font-bold tracking-wider uppercase mb-6 inline-block">Atenção: Acesso Restrito</span>
                            <h1 className="text-3xl md:text-6xl font-black mb-6 leading-tight uppercase tracking-tighter">O INSS Te Deve Dinheiro — E Você Nem Sabe</h1>
                            <p className="text-base md:text-xl text-red-100 mb-10 max-w-3xl mx-auto font-medium">Descubra como receber o Salário Maternidade que é seu por direito, do zero ao depósito na conta, sem precisar de advogado, sem enfrentar fila e sem entender nada de lei — mesmo que o INSS já tenha negado antes.</p>
                            
                            <div className="bg-white p-6 md:p-10 rounded-[32px] border-4 border-red-500 inline-block text-left max-w-2xl shadow-2xl transform hover:scale-[1.02] transition-transform text-slate-900">
                                <div className="flex items-start gap-4">
                                    <div className="shrink-0 mt-1"><Icon name="badgeCheck" className="w-8 h-8 text-green-600" /></div>
                                    <p className="text-base md:text-xl font-bold leading-relaxed">De acordo com as suas respostas no quiz… Identificamos que você se enquadra no perfil de mães que têm direito ao benefício e ainda estão dentro do prazo legal de 5 anos para solicitar. O que você vai ver agora foi preparado especialmente para a sua situação.</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* BLOCO 2 — IDENTIFICAÇÃO */}
                    <section className="py-16 md:py-24 px-4 bg-white">
                        <div className="max-w-3xl mx-auto space-y-6 text-lg md:text-2xl text-slate-700 font-medium leading-relaxed">
                            <p className="font-black text-2xl md:text-4xl text-slate-900 leading-tight">9 em cada 10 mães brasileiras que têm direito ao Salário Maternidade nunca receberam.</p>
                            <p>Não porque o INSS não paga. Não porque é impossível. Mas porque ninguém ensinou o caminho certo.</p>
                            <p>Talvez você tenha ido ao INSS e saído sem resposta. Talvez tenha pesquisado no Google e ficado mais confusa do que antes. Talvez achasse que por ser MEI, autônoma ou desempregada não tinha direito.</p>
                            <p>Ou talvez simplesmente não soubesse que esse benefício existe — e que ele pode chegar a mais de <span className="text-red-600 font-black">R$9.000</span> dependendo do seu caso.</p>
                            <p>A verdade é uma só: <span className="bg-yellow-200 px-2 text-slate-900 font-black">esse dinheiro já é seu.</span> Ele só precisa ser buscado do jeito certo.</p>
                            <p>E é exatamente isso que o <span className="font-black text-slate-900">Protocolo Maternidade</span> faz por você — te mostra o caminho exato, passo a passo, sem juridiquês, sem complicação, sem precisar pagar nada a mais por isso.</p>
                            <div className="mt-12 text-center">
                                <button onClick={scrollToPrice} className="w-full md:w-auto bg-green-600 hover:bg-green-700 text-white font-black text-sm md:text-2xl py-6 md:py-8 px-10 md:px-16 rounded-[24px] md:rounded-[40px] shadow-2xl uppercase transition-transform hover:scale-105">
                                    QUERO RECEBER MEU ACESSO IMEDIATO
                                </button>
                            </div>
                        </div>
                    </section>

                    {/* BLOCO 3 — PROVAS */}
                    <section className="py-16 md:py-24 px-4 bg-slate-50">
                        <div className="max-w-5xl mx-auto">
                            <h2 className="text-xl md:text-4xl font-black text-center mb-16 italic text-slate-800 uppercase leading-tight">Isso não é teoria. É o que acontece quando a mãe tem o caminho certo:</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16">
                                {[
                                    { name: "Fernanda S.", role: "autônoma, São Paulo", initials: "FS", text: "Eu tinha desistido. Fui ao INSS duas vezes e não entendia nada do que me falavam. Segui o Protocolo Maternidade do zero e em menos de uma semana meu processo estava protocolado. Recebi R$7.200 que nem sabia que existiam." },
                                    { name: "Camila R.", role: "MEI, Fortaleza", initials: "CR", text: "Minha filha já tinha 4 anos e eu achei que tinha perdido o prazo. Quando vi que ainda dava tempo, corri. O guia me mostrou exatamente o que fazer. Foi mais simples do que eu imaginava." },
                                    { name: "Patrícia M.", role: "desempregada, Rio de Janeiro", initials: "PM", text: "O INSS tinha negado. Achei que era o fim. O Protocolo explica o que fazer exatamente nesse caso — contestei e recebi." }
                                ].map((t, i) => (
                                    <div key={i} className="bg-white p-8 rounded-[40px] shadow-xl border border-slate-100 flex flex-col justify-between">
                                        <p className="text-slate-600 italic mb-10 leading-relaxed font-medium text-base">"{t.text}"</p>
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center font-black text-red-600 shadow-inner">{t.initials}</div>
                                            <div>
                                                <p className="font-black text-slate-800 uppercase text-sm">{t.name}</p>
                                                <p className="text-[10px] text-slate-500 uppercase font-bold">{t.role}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="bg-red-50 p-8 rounded-[24px] border-l-8 border-red-600 max-w-3xl mx-auto shadow-sm">
                                <p className="text-red-900 font-medium text-base md:text-xl leading-relaxed">
                                    <span className="font-black block uppercase text-xs mb-2 tracking-widest">Dado importante:</span>
                                    De acordo com o Ministério da Previdência Social, mais de R$2 bilhões em salário maternidade deixam de ser solicitados no Brasil todo ano. A principal razão: desinformação. Esse dinheiro não some. Ele fica parado — esperando que a mãe saiba como buscar.
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* BLOCO 4 — CHEGA DE PERDER */}
                    <section className="py-16 md:py-24 px-4 bg-white text-center">
                        <div className="max-w-3xl mx-auto">
                            <h2 className="text-2xl md:text-5xl font-black text-slate-900 mb-12 uppercase italic leading-tight">Chega de Perder o Que É Seu Por Não Saber Como Pedir</h2>
                            <div className="text-left space-y-4 md:space-y-6 mb-12">
                                {[
                                    "Chega de achar que precisa de advogado para receber um direito que já é seu",
                                    "Chega de ir ao INSS e voltar pra casa sem resposta e sem dinheiro",
                                    "Chega de ver outras mães recebendo enquanto você não sabe nem por onde começar",
                                    "Chega de tener medo de que o INSS negue e você não saiba o que fazer",
                                    "Chega de deixar esse dinheiro parado enquanto as contas não param de chegar"
                                ].map((item, i) => (
                                    <div key={i} className="flex gap-4 items-center bg-slate-50 p-5 rounded-2xl border border-slate-100">
                                        <Icon name="badgeCheck" className="text-green-600 w-6 h-6 shrink-0" />
                                        <span className="font-bold text-slate-700 text-sm md:text-xl">{item}</span>
                                    </div>
                                ))}
                            </div>
                            <div className="bg-slate-900 text-white p-10 rounded-[48px] mb-12 text-left relative overflow-hidden shadow-2xl">
                                <p className="text-red-400 font-black mb-6 uppercase text-sm tracking-widest">Veja mais uma história real:</p>
                                <p className="text-lg md:text-2xl italic mb-8 leading-relaxed font-light">"Sou MEI há 3 anos e sempre achei que não tinha direito. Uma amiga me mandou o Protocolo Maternidade. Segui tudo e em 30 dias o dinheiro estava na minha conta. Foram R$8.400 que mudaram completamente minha vida."</p>
