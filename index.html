<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocolo Maternidade - O INSS Te Deve Dinheiro</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para processar JSX no navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .animate-spin { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Smooth Scroll */
        html { scroll-behavior: smooth; }
        
        /* Ajustes Mobile Específicos */
        @media (max-width: 640px) {
            .mobile-fit-height {
                height: 100dvh;
                display: flex;
                flex-direction: column;
                justify-content: center;
                padding: 1rem;
            }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-6 h-6" }) => {
            const icons = {
                target: (
                    <>
                        <path d="M12 13a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z"/>
                        <path d="M4 12a8 8 0 1 0 16 0 8 8 0 0 0-16 0Z"/>
                        <path d="M12 2v2"/>
                        <path d="M12 20v2"/>
                        <path d="M20 12h2"/>
                        <path d="M2 12h2"/>
                    </>
                ),
                arrowRight: (
                    <>
                        <path d="M5 12h14"/>
                        <path d="m12 5 7 7-7 7"/>
                    </>
                ),
                badgeCheck: (
                    <>
                        <path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/>
                        <path d="m9 12 2 2 4-4"/>
                    </>
                ),
                lock: (
                    <>
                        <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </>
                ),
                shieldCheck: (
                    <>
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10Z"/>
                        <path d="m9 12 2 2 4-4"/>
                    </>
                ),
                star: (
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                ),
                chevronDown: (
                    <path d="m6 9 6 6 6-6"/>
                ),
                chevronUp: (
                    <path d="m18 15-6-6-6 6"/>
                ),
                alertCircle: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" x2="12" y1="8" y2="12"/>
                        <line x1="12" x2="12.01" y1="16" y2="16"/>
                    </>
                ),
                fileText: (
                    <>
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <line x1="10" y1="9" x2="8" y2="9"/>
                    </>
                ),
                smartphone: (
                    <>
                        <rect width="14" height="20" x="5" y="2" rx="2" ry="2"/>
                        <path d="M12 18h.01"/>
                    </>
                ),
                checkSquare: (
                    <>
                        <polyline points="9 11 12 14 22 4"/>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                    </>
                ),
                thumbsUp: (
                    <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3M14 22a3 3 0 0 0 3-3v-5a3 3 0 0 0-3-3h-4l1-4a2 2 0 0 0-3-2H7v17h7z"/>
                ),
                xCircle: (
                    <>
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="15" y1="9" x2="9" y2="15"/>
                        <line x1="9" y1="9" x2="15" y2="15"/>
                    </>
                )
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        const App = () => {
            const [step, setStep] = useState('start'); 
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [openFaq, setOpenFaq] = useState(null);
            const priceRef = useRef(null);

            const pushEvent = (eventName) => {
                if (typeof window !== 'undefined') {
                    window.dataLayer = window.dataLayer || [];
                    window.dataLayer.push({
                        event: eventName,
                        timestamp: new Date().getTime()
                    });
                }
            };

            const scrollToPrice = () => {
                priceRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

            useEffect(() => {
                if (step === 'sales') {
                    pushEvent('landingpage visit');
                }
            }, [step]);

            const quizQuestions = [
                { q: "Qual é a sua situação de trabalho atualmente?", options: ["Sou MEI (tenho CNPJ próprio)", "Trabalho como autônoma / freelancer", "Sou CLT (carteira assinada)", "Estou desempregada mas contribuí para o INSS", "Nunca contribuí para o INSS"] },
                { q: "Qual é a situação do seu filho?", options: ["Estou grávida agora", "Meu filho tem menos de 1 ano", "Meu filho tem entre 1 e 3 anos", "Meu filho tem entre 3 e 5 anos"] },
                { q: "Antes desse quiz, você sabia que tinha direito ao salário maternidade?", options: ["Não fazia ideia que existia esse benefício", "Sabia que existia mas achei que não me encaixava", "Sabia mas não sei como dar entrada", "Já tentei dar entrada mas o INSS negou"] },
                { q: "O que mais te impede de buscar esse benefício?", options: ["Não tenho dinheiro para pagar um advogado", "Acho que é muito complicado e burocrático", "Tenho medo de o INSS negar", "Não sei quais documentos juntar", "Não sei nem por onde começar"] },
                { q: "Você já tentou dar entrada no salário maternidade antes?", options: ["Nunca tentei, não sabia como", "Fui ao INSS pessoalmente e saí sem resposta", "Pesquisei no Google mas fiquei mais confusa", "O INSS negou e não soube o que fazer", "Um familiar tentou me ajudar mas não conseguiu"] },
                { q: "Como está sua situação financeira agora?", options: ["Estou bem, mas esse dinheiro extra faria diferença", "Está apertada e esse valor resolveria muito", "Está muito difícil e preciso muito desse dinheiro", "Estou endividada e esse beneficio seria essencial"] },
                { q: "Quanto tempo você teria para seguir um passo a passo e dar entrada no processo?", options: ["Menos de 1 hora por dia", "Entre 1 e 2 horas", "Tenho tempo disponível, quero resolver logo", "Quero algo que eu possa fazer no celular mesmo"] },
                { q: "O que você quer fazer com o dinheiro do salário maternidade?", options: ["Quitar dívidas", "Investir nos meus filhos", "Montar uma reserva de emergência", "Pagar contas atrasadas", "Dar uma vida melhor para minha família"] },
                { q: "Se você recebesse o salário maternidade hoje, qual seria a primeira coisa que faria?", options: ["Pagaria as contas que estão me tirando o sono", "Compraria algo que meu filho precisa", "Guardaria como reserva para o futuro"] },
                { q: "Como você se sentiria sabendo que resolveu isso sozinha, sem pagar advogado?", options: ["Aliviada e orgulhosa", "Mais confiante para buscar outros direitos", "Finalmente no controle da minha situação", "Todas as opções acima"] },
                { q: "Em quanto tempo você quer resolver isso?", options: ["Quero começar hoje mesmo", "Essa semana", "Esse mês", "Quando tiver mais tempo"] },
                { q: "O que seria diferente na sua vida com esse dinheiro em mãos?", options: ["Teria menos estresse financeiro", "Meu filho teria mais do que precisa", "Me sentiria mais independente", "Conseguiria respirar e planejar o futuro"] }
            ];

            const handleQuizAnswer = () => {
                pushEvent(`Pagina ${currentQuestion + 1} concluida`);
                if (currentQuestion < quizQuestions.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    setStep('analyzing');
                    setTimeout(() => setStep('result'), 3000);
                }
            };

            const handleFinalResultClick = () => {
                pushEvent('analise concluida');
                setStep('sales');
                window.scrollTo({ top: 0 });
            };

            if (step === 'start') {
                return (
                    <div className="min-h-screen mobile-fit-height bg-slate-50 flex flex-col items-center justify-center p-4 text-slate-900">
                        <div className="max-w-2xl w-full bg-white rounded-[40px] shadow-2xl overflow-hidden border border-slate-100 flex flex-col">
                            <div className="bg-red-600 p-6 md:p-8 text-center text-white">
                                <h1 className="text-xl md:text-3xl font-black uppercase mb-4 leading-tight">
                                    Descubra em 2 Minutos Se Você Tem Direito ao Salário Maternidade — e Quanto Pode Receber Ainda Este Ano
                                </h1>
                                <p className="text-red-100 text-base md:text-lg">
                                    Milhares de mães brasileiras deixam de receber esse dinheiro todo ano simplesmente por não saber que têm direito.
                                </p>
                            </div>
                            <div className="p-6 md:p-12 text-center flex-1">
                                <p className="text-slate-600 mb-6 text-sm md:text-lg font-medium">
                                    Responda o teste rápido e descubra sua situação agora. Como receber sem advogado, sem complicação.
                                </p>
                                <p className="font-bold text-slate-800 mb-6 text-lg">Pronta para descobrir?</p>
                                <button onClick={() => setStep('quiz')} className="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 md:py-6 rounded-2xl text-sm md:text-xl shadow-xl transition-all transform hover:scale-105 uppercase whitespace-nowrap px-2">
                                    QUERO SABER SE TENHO DIREITO
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (step === 'quiz') {
                return (
                    <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 py-8 text-slate-900">
                        <div className="max-w-xl w-full bg-white rounded-3xl shadow-xl p-6 md:p-8 border border-slate-100 relative">
                            <div className="flex justify-between items-center mb-6">
                                <span className="text-xs font-black text-slate-400 uppercase tracking-widest font-bold">Pergunta {currentQuestion + 1} de {quizQuestions.length}</span>
                                <div className="w-24 md:w-32 bg-slate-100 h-2 rounded-full overflow-hidden">
                                    <div className="bg-red-600 h-full transition-all duration-500" style={{ width: `${((currentQuestion + 1) / quizQuestions.length) * 100}%` }}></div>
                                </div>
                            </div>
                            <h2 className="text-lg md:text-2xl font-black text-slate-800 mb-6 leading-tight">{quizQuestions[currentQuestion].q}</h2>
                            <div className="space-y-2 md:space-y-3">
                                {quizQuestions[currentQuestion].options.map((opt, idx) => (
                                    <button key={idx} onClick={handleQuizAnswer} className="w-full text-left p-4 md:p-5 rounded-xl border-2 border-slate-100 hover:border-red-500 hover:bg-red-50 transition-all text-slate-700 font-bold flex justify-between items-center group shadow-sm text-sm md:text-base">
                                        {opt}
                                        <Icon name="arrowRight" className="w-4 h-4 md:w-5 md:h-5 text-slate-300 group-hover:text-red-500 transform group-hover:translate-x-1 transition-transform" />
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            if (step === 'analyzing') {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4 text-center text-slate-900">
                        <div className="w-full max-w-md bg-white p-12 rounded-[40px] shadow-2xl">
                            <div className="relative w-16 md:w-24 h-16 md:h-24 mb-8 mx-auto">
                                <div className="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
                                <div className="absolute inset-0 border-4 border-red-600 rounded-full border-t-transparent animate-spin"></div>
                            </div>
                            <h2 className="text-xl md:text-2xl font-black text-slate-800 mb-4 leading-tight">Cruzando seus dados com as regras do INSS...</h2>
                            <p className="text-slate-500 animate-pulse text-sm">Aguarde, análise em tempo real.</p>
                        </div>
                    </div>
                );
            }

            if (step === 'result') {
                return (
                    <div className="min-h-screen mobile-fit-height bg-slate-50 flex flex-col items-center justify-center p-4 text-center text-slate-900">
                        <div className="max-w-2xl w-full bg-white rounded-[32px] md:rounded-[40px] shadow-2xl p-6 md:p-12 border border-slate-100">
                            <div className="bg-green-100 text-green-700 font-black px-4 py-1 rounded-full text-[10px] md:text-sm inline-block mb-4 uppercase tracking-widest font-bold">✅ ANÁLISE CONCLUÍDA.</div>
                            <div className="space-y-4 text-left mb-6">
                                <p className="text-lg md:text-xl font-bold text-slate-800 leading-tight">Com base nas suas respostas, identificamos que você muito provavelmente tem direito ao Salário Maternidade — e esse valor pode estar esperando por você há meses ou até anos.</p>
                                <div className="bg-slate-50 p-4 rounded-2xl border-l-4 border-red-600">
                                    <p className="mb-2 text-slate-700 font-medium text-xs md:text-base">O problema não é falta de direito.</p>
                                    <p className="font-black text-slate-900 text-sm md:text-lg">O problema é falta de um caminho claro para buscar o que já é seu.</p>
                                </div>
                                <p className="text-slate-600 leading-relaxed font-medium text-xs md:text-base">É exatamente por isso que criamos o <span className="font-black">Protocolo Maternidade</span> — um guia passo a passo direto do seu celular.</p>
                            </div>
                            <button onClick={handleFinalResultClick} className="w-full bg-green-600 hover:bg-green-700 text-white font-black py-4 md:py-8 rounded-2xl md:rounded-3xl text-sm md:text-2xl shadow-xl transition-all transform hover:scale-105 uppercase whitespace-nowrap px-1">
                                QUERO O PROTOCOLO MATERNIDADE AGORA
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-white text-slate-900">
                    {/* BLOCO 1 — HEADLINE */}
                    <section className="bg-gradient-to-b from-red-700 to-red-800 text-white py-12 md:py-16 px-4">
                        <div className="max-w-4xl mx-auto text-center">
                            <span className="bg-red-500/30 text-red-100 px-4 py-1 rounded-full text-xs font-bold tracking-wider uppercase mb-6 inline-block tracking-widest font-bold">Atenção: Acesso Restrito</span>
                            <h1 className="text-3xl md:text-6xl font-black mb-6 leading-tight uppercase tracking-tighter">O INSS Te Deve Dinheiro — E Você Nem Sabe</h1>
                            <p className="text-base md:text-xl text-red-100 mb-8 max-w-3xl mx-auto font-medium">Descubra como receber o Salário Maternidade que é seu por direito, do zero ao depósito na conta, sem advogado — mesmo que o INSS já tenha negado antes.</p>
                            
                            <div className="bg-white p-6 md:p-8 rounded-[24px] md:rounded-[32px] border-4 border-red-500 inline-block text-left max-w-2xl shadow-2xl transform hover:scale-[1.02] transition-transform text-slate-900 mt-6">
                                <div className="flex items-start gap-3 md:gap-4">
                                    <div className="shrink-0 mt-1"><Icon name="badgeCheck" className="w-6 h-6 md:w-8 md:h-8 text-green-600" /></div>
                                    <p className="text-sm md:text-xl font-bold leading-relaxed">De acordo com as suas respostas no quiz… Identificamos que você se enquadra no perfil de mães que têm direito ao benefício e ainda estão dentro do prazo legal de 5 anos para solicitar. O que você vai ver agora foi preparado especialmente para a sua situação.</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* BLOCO 2 — IDENTIFICAÇÃO */}
                    <section className="py-16 md:py-20 px-4 bg-white">
                        <div className="max-w-3xl mx-auto space-y-6 text-lg md:text-xl text-slate-700 font-medium leading-relaxed">
                            <p className="font-black text-2xl md:text-3xl text-slate-900 leading-tight">9 em cada 10 mães brasileiras que têm direito ao Salário Maternidade nunca receberam.</p>
                            <p>Não porque o INSS não paga. Não porque é impossível. Mas porque ninguém ensinou o caminho certo.</p>
                            <p>A verdade é uma só: <span className="bg-yellow-200 px-2 text-slate-900 font-black">esse dinheiro já é seu.</span> Ele só precisa ser buscado do jeito certo.</p>
                            <div className="mt-10 md:mt-12 text-center">
                                <button onClick={scrollToPrice} className="w-full md:w-auto bg-green-600 hover:bg-green-700 text-white font-black text-sm md:text-xl py-5 md:py-7 px-8 md:px-12 rounded-[20px] md:rounded-[32px] shadow-2xl uppercase transition-transform hover:scale-105">
                                    Quero Receber o Que É Meu — Acesso Imediato
                                </button>
                            </div>
                        </div>
                    </section>

                    {/* BLOCO 3 — PROVAS */}
                    <section className="py-16 md:py-20 px-4 bg-slate-50">
                        <div className="max-w-5xl mx-auto">
                            <h2 className="text-xl md:text-3xl font-black text-center mb-12 md:text-center italic text-slate-800 uppercase leading-tight">Isso não é teoria. É o que acontece quando a mãe tem o caminho certo:</h2>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-8 mb-12 md:mb-16">
                                {[
                                    { name: "Fernanda S.", role: "autônoma, SP", initials: "FS", text: "Eu tinha desistido. Fui ao INSS duas vezes e não entendia nada. Recebi R$7.200 que nem sabia que existiam." },
                                    { name: "Camila R.", role: "MEI, Fortaleza", initials: "CR", text: "Minha filha já tinha 4 anos e eu achei que tinha perdido o prazo. Foi mais simples do que eu imaginava." },
                                    { name: "Patrícia M.", role: "desempregada, RJ", initials: "PM", text: "O INSS tinha negado. Achei que era o fim. O Protocolo explica o que fazer — contestei e recebi." }
                                ].map((t, i) => (
                                    <div key={i} className="bg-white p-6 rounded-[24px] md:rounded-[40px] shadow-lg border border-slate-100 flex flex-col justify-between">
                                        <p className="text-slate-600 italic mb-8 leading-relaxed font-medium text-sm md:text-base">"{t.text}"</p>
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center font-black text-red-600 shadow-inner text-sm">{t.initials}</div>
                                            <div>
                                                <p className="font-black text-slate-800 uppercase tracking-tighter text-xs md:text-sm">{t.name}</p>
                                                <p className="text-[10px] text-slate-500">{t.role}</p>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="bg-red-50 p-6 rounded-[20px] border-l-8 border-red-600 max-w-3xl mx-auto shadow-sm">
                                <p className="text-red-900 font-medium text-sm md:text-lg leading-relaxed">
                                    <span className="font-black block uppercase text-xs mb-1 tracking-widest">Dado importante:</span>
                                    Mais de R$2 bilhões deixam de ser solicitados no Brasil todo ano. A principal razão: desinformação. Esse dinheiro fica parado esperando que a mãe saiba como buscar.
                                </p>
                            </div>
                        </div>
                    </section>

                    {/* BLOCO 4 — CHEGA DE PERDER */}
                    <section className="py-16 px-4 bg-white text-center">
                        <div className="max-w-3xl mx-auto">
                            <h2 className="text-2xl md:text-4xl font-black text-slate-900 mb-10 uppercase italic leading-tight">Chega de Perder o Que É Seu Por Não Saber Como Pedir</h2>
                            <div className="text-left space-y-3 md:space-y-4 mb-10">
                                {[
                                    "Chega de achar que precisa de advogado",
                                    "Chega de ir ao INSS e voltar sem resposta",
                                    "Chega de ver outras mães recebendo e você não",
                                    "Chega de ter medo de que o INSS negue",
                                    "Chega de deixar esse dinheiro parado"
                                ].map((item, i) => (
                                    <div key={i} className="flex gap-3 items-center bg-slate-50 p-4 rounded-xl border border-slate-100">
                                        <Icon name="badgeCheck" className="text-green-600 w-5 h-5 shrink-0" />
                                        <span className="font-bold text-slate-700 text-sm md:text-base">{item}</span>
                                    </div>
                                ))}
                            </div>
                            <div className="bg-slate-900 text-white p-8 rounded-[32px] mb-10 text-left relative overflow-hidden shadow-2xl">
                                <p className="text-red-400 font-black mb-4 uppercase text-xs tracking-widest">Veja mais uma história real:</p>
                                <p className="text-base md:text-xl italic mb-6 leading-relaxed font-light">"Sou MEI e sempre achei que não tinha direito. Segui o Protocolo e em 30 dias o dinheiro estava na conta. Foram R$8.400!"</p>
                                <p className="font-black text-base md:text-xl">— Mariana T., MEI, BH</p>
                            </div>
                        </div>
                    </section>

                    {/* BLOCO 5 — DIAGNÓSTICO */}
                    <section className="py-16 px-4 bg-slate-950 text-white">
                        <div className="max-w-4xl mx-auto">
                            <h2 className="text-2xl md:text-4xl font-black text-center mb-12 uppercase italic leading-tight">Resultado da Sua Avaliação</h2>
                            <div className="grid gap-4 md:gap-6 text-left">
                                {[
                                    { title: "Problema 1 — Desinformação", desc: "A maioria das mães não sabe que tem direito. MEI, autônoma, CLT, desempregada — cada situação tem um caminho." },
                                    { title: "Problema 2 — Medo da burocracia", desc: "Termos jurídicos e formulários complicados fazem com que ela desista antes mesmo de tentar." },
                                    { title: "Problema 3 — Falta de um caminho", desc: "Ir ao INSS sem saber o que pedir é como entrar num labirinto sem mapa. O processo trava." },
                                    { title: "Problema 4 — O INSS negou", desc: "Uma negativa não é o fim. Mas sem saber como contestar corretamente, a maioria desiste." },
                                    { title: "Problema 5 — O prazo correndo", desc: "O direito prescreve em 5 anos. Cada dia que passa é um dia a menos para buscar o que é seu." }
                                ].map((p, i) => (
                                    <div key={i} className="bg-white/5 border border-white/10 p-6 rounded-[24px]">
                                        <h3 className="text-red-500 font-black mb-3 flex items-center gap-2 uppercase text-base md:text-lg italic">
                                            <Icon name="xCircle" className="w-5 h-5" /> {p.title}
                                        </h3>
                                        <p className="text-slate-300 leading-relaxed text-sm md:text-base">{p.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* BLOCO 6 — DOR & SOLUÇÃO */}
                    <section className="py-16 md:py-24 px-4 bg-white text-center">
                        <div className="max-w-4xl mx-auto">
                            <h2 className="text-2xl md:text-4xl font-black mb-16 uppercase italic leading-tight text-slate-900">Resolva Tudo Isso Com o Protocolo Maternidade</h2>
                            <div className="space-y-12 text-left">
                                {[
                                    { q: "Sem saber por onde começar?", a: "O Protocolo começa do absoluto zero. A primeira etapa é uma verificação simples que te coloca no caminho certo." },
                                    { q: "Com medo da burocracia?", a: "Cada passo do guia foi escrito em português simples. Você vai saber exatamente o que fazer e o que esperar." },
                                    { q: "O INSS negou antes?", a: "Existe uma etapa específica para isso. Você vai saber como contestar e aumentar as chances de reverter." },
                                    { q: "Sem tempo ou dinheiro para advogado?", a: "O Protocolo foi feito para ser seguido em menos de 2 horas, direto do celular, custando uma fração do que um advogado cobraria." }
                                ].map((item, i) => (
                                    <div key={i} className="flex flex-col md:flex-row gap-4 md:gap-8 border-b border-slate-100 pb-8 last:border-0">
                                        <p className="text-red-600 font-black text-lg md:text-2xl uppercase italic md:w-1/3">{item.q}</p>
                                        <p className="text-slate-700 text-sm md:text-xl md:w-2/3 leading-relaxed">{item.a}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* BLOCO 7 — COMO FUNCIONA */}
                    <section className="py-16 px-4 bg-red-600 text-white">
                        <div className="max-w-5xl mx-auto text-center">
                            <h2 className="text-2xl md:text-4xl font-black mb-12 uppercase italic">Veja Como Funciona na Prática</h2>
                            <div className="grid md:grid-cols-3 gap-8 text-left">
                                {[
                                    { step: "01", title: "Verifique Direitos", desc: "Identifica seu perfil (MEI, CLT, etc) e mostra o caminho específico." },
                                    { step: "02", title: "Monte Seu Processo", desc: "Te guia documento por documento, explicando como preencher e o que juntar." },
                                    { step: "03", title: "Protocole", desc: "Pedido direto pelo celular. Se o INSS negar, te ensinamos a contestar." }
                                ].map((s, i) => (
                                    <div key={i} className="bg-white/10 p-8 rounded-[32px] border border-white/20 relative">
                                        <span className="absolute -top-4 left-6 bg-white text-red-600 font-black px-4 py-1 rounded-full text-xs shadow-xl">PASSO {s.step}</span>
                                        <h3 className="text-xl font-black mb-4 mt-2 uppercase italic">{s.title}</h3>
                                        <p className="text-red-50 text-sm leading-relaxed">{s.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* BLOCO 8 — ENTREGÁVEIS */}
                    <section className="py-16 md:py-24 px-4 bg-white">
                        <div className="max-w-4xl mx-auto text-center">
                            <h2 className="text-2xl md:text-4xl font-black mb-12 md:mb-20 uppercase italic leading-tight">Tudo Que Você Recebe no Pacote</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6 text-left mb-12">
                                <div className="bg-slate-50 p-6 rounded-[24px] border border-slate-100 flex gap-4 items-start">
                                    <div className="bg-red-600 p-3 rounded-xl text-white shrink-0"><Icon name="fileText" /></div>
                                    <div>
                                        <h3 className="font-black text-lg mb-2">E-book Protocolo Maternidade</h3>
                                        <p className="text-slate-600 text-xs md:text-sm">Passo a passo completo do zero ao depósito.</p>
                                    </div>
                                </div>
                                <div className="bg-slate-50 p-6 rounded-[24px] border border-slate-100 flex gap-4 items-start">
                                    <div className="bg-red-600 p-3 rounded-xl text-white shrink-0"><Icon name="checkSquare" /></div>
                                    <div>
                                        <h3 className="font-black text-lg mb-2">Checklist de Documentos</h3>
                                        <p className="text-slate-600 text-xs md:text-sm italic">Incluso gratuitamente (Valor: R$37)</p>
                                    </div>
                                </div>
                                <div className="bg-slate-50 p-6 rounded-[24px] border border-slate-100 flex gap-4 items-start">
                                    <div className="bg-red-600 p-3 rounded-xl text-white shrink-0"><Icon name="badgeCheck" /></div>
                                    <div>
                                        <h3 className="font-black text-lg mb-2">Modelo de Contestação</h3>
                                        <p className="text-slate-600 text-xs md:text-sm italic">Incluso gratuitamente (Valor: R$67)</p>
                                    </div>
                                </div>
                                <div className="bg-slate-50 p-6 rounded-[24px] border border-slate-100 flex gap-4 items-start">
                                    <div className="bg-red-600 p-3 rounded-xl text-white shrink-0"><Icon name="smartphone" /></div>
                                    <div>
                                        <h3 className="font-black text-lg mb-2">Guia Acesso Celular</h3>
                                        <p className="text-slate-600 text-xs md:text-sm italic">Incluso gratuitamente (Valor: R$27)</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* BLOCO 9 — PROVAS SOCIAIS 2 */}
                    <section className="py-16 px-4 bg-slate-50 text-slate-900">
                        <div className="max-w-4xl mx-auto">
                            <h2 className="text-xl md:text-3xl font-black text-center mb-10 uppercase italic">O que as mães estão falando:</h2>
                            <div className="space-y-4 text-left">
                                {[
                                    { text: "Meu filho tinha 4 anos e 8 meses. Recebi R$6.800. Chorei muito.", name: "Rosana F., diarista, GO" },
                                    { text: "O INSS sempre negava. Com o Protocolo entendi o erro. R$9.100 na conta.", name: "Juliana C., autônoma, RS" },
                                    { text: "Sou MEI e diziam que eu não tinha direito. Processo aprovado em 18 dias.", name: "Tatiana B., MEI, Curitiba" }
                                ].map((t, i) => (
                                    <div key={i} className="bg-white p-6 rounded-[24px] border border-slate-100 shadow-sm flex flex-col md:flex-row gap-4 md:items-center">
                                        <div className="shrink-0 flex gap-1">
                                            {[...Array(5)].map((_, j) => <Icon key={j} name="star" className="w-4 h-4 text-amber-500 fill-amber-500" />)}
                                        </div>
                                        <div>
                                            <p className="text-slate-700 text-sm italic font-medium">"{t.text}"</p>
                                            <p className="text-slate-950 font-black text-[10px] uppercase tracking-widest mt-1">— {t.name}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* BLOCO 10 — VANTAGENS */}
                    <section className="py-16 px-4 bg-white text-center">
                        <div className="max-w-3xl mx-auto">
                            <h2 className="text-2xl md:text-4xl font-black mb-12 uppercase italic leading-tight">Vantagens do Protocolo</h2>
                            <div className="grid grid-cols-1 gap-3 text-left">
                                {[
                                    "Descobre em minutos se tem direito",
                                    "Segue um caminho claro sem entender de lei",
                                    "Economiza de R$800 a R$3.000 de advogado",
                                    "Sabe exatamente quais documentos juntar",
                                    "Aprende o que fazer se o INSS negar",
                                    "Resolve tudo em 2 horas, do celular",
                                    "Pode receber entre R$4.000 e R$9.000"
                                ].map((v, i) => (
                                    <div key={i} className="flex gap-3 items-center bg-green-50 p-4 rounded-xl border border-green-100">
                                        <Icon name="badgeCheck" className="text-green-600 w-5 h-5 shrink-0" />
                                        <span className="text-slate-700 font-bold text-sm md:text-base uppercase tracking-tighter">{v}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* BLOCO 11 — OFERTA IRRESISTÍVEL */}
                    <section ref={priceRef} className="py-16 md:py-24 px-4 bg-slate-900 text-white relative overflow-hidden">
                        <div className="max-w-4xl mx-auto text-center relative z-10">
                            <h2 className="text-3xl md:text-5xl font-black mb-12 uppercase italic leading-tight">Garanta Seu Acesso</h2>
                            <div className="bg-white text-slate-900 rounded-[40px] md:rounded-[64px] p-8 md:p-16 mb-12 shadow-2xl border-x-[8px] md:border-x-[12px] border-red-600">
                                <div className="bg-red-600 text-white px-6 py-2 rounded-full font-black text-xs md:text-lg uppercase mb-8 animate-pulse inline-block tracking-widest">⚠️ Oferta Especial Black Friday</div>
                                <div className="text-left space-y-4 mb-10 max-w-xs mx-auto text-xs md:text-lg font-medium">
                                    <div className="flex justify-between border-b pb-2"><span>E-book Protocolo</span><span className="text-slate-400">R$97</span></div>
                                    <div className="flex justify-between border-b pb-2"><span>Checklist Bônus</span><span className="text-slate-400">Grátis</span></div>
                                    <div className="flex justify-between border-b pb-2"><span>Modelo Contestação</span><span className="text-slate-400">Grátis</span></div>
                                    <div className="flex justify-between pt-4 font-black text-red-600 italic"><span>Valor Total:</span><span className="line-through text-slate-300">R$228</span></div>
                                </div>
                                <div className="mb-10">
                                    <p className="text-slate-500 text-base md:text-2xl font-bold uppercase tracking-widest">De R$97 por apenas</p>
                                    <p className="text-5xl md:text-8xl font-black text-slate-950 my-2 tracking-tighter leading-none">R$27,90</p>
                                    <p className="text-xl md:text-3xl font-black text-red-600 uppercase italic">ou 3x de R$9,97</p>
                                </div>
                                <a href="https://instagram.com/joaopedromktd" target="_blank" className="block w-full bg-green-600 hover:bg-green-700 text-white font-black text-lg md:text-3xl py-6 rounded-[20px] md:rounded-[40px] shadow-2xl uppercase transition-transform hover:scale-105 flex items-center justify-center text-center">
                                    QUERO O PROTOCOLO AGORA
                                </a>
                                <div className="flex items-center justify-center gap-6 mt-10 text-slate-400">
                                    <div className="flex items-center gap-2"><Icon name="lock" className="w-4 h-4 md:w-5 md:h-5" /> <span className="text-[10px] md:text-xs font-black uppercase tracking-widest">100% SEGURO</span></div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* BLOCO 12 — GARANTIA + FAQ */}
                    <section className="py-16 md:py-24 px-4 bg-white border-t border-slate-100">
                        <div className="max-w-4xl mx-auto text-center">
                            <div className="bg-slate-50 p-8 rounded-[32px] md:rounded-[64px] mb-16">
                                <Icon name="shieldCheck" className="w-20 md:w-32 h-20 md:h-32 text-red-600 mx-auto mb-6" />
                                <h2 className="text-2xl md:text-4xl font-black text-slate-950 mb-6 uppercase italic leading-tight">Garantia de 7 Dias</h2>
                                <p className="text-slate-700 text-sm md:text-xl leading-relaxed max-w-2xl mx-auto italic font-medium">Testre o Protocolo por 7 dias. Se não gostar, devolvemos 100% do seu dinheiro. Sem perguntas.</p>
                            </div>

                            <h3 className="text-2xl md:text-4xl font-black text-slate-900 mb-12 uppercase italic leading-tight">Dúvidas Frequentes</h3>
                            <div className="space-y-4 text-left max-w-3xl mx-auto">
                                {[
                                    { q: "Funciona para MEI e desempregada?", a: "Sim. O Protocolo identifica seu perfil e te mostra o caminho específico." },
                                    { q: "E se meu filho tem mais de 1 ano?", a: "Você tem até 5 anos após o nascimento para solicitar. Ainda está no prazo." },
                                    { q: "INSS negou antes. Vale tentar?", a: "Sim. Ensinamos como contestar e aumentar as chances de aprovação." }
                                ].map((faq, i) => (
                                    <div key={i} className="border-2 border-slate-50 rounded-[20px] overflow-hidden">
                                        <button onClick={() => setOpenFaq(openFaq === i ? null : i)} className="w-full flex justify-between items-center p-6 text-left font-black text-slate-800 hover:bg-slate-50 transition-colors uppercase text-xs md:text-sm leading-tight tracking-tight">
                                            {faq.q}
                                            <Icon name={openFaq === i ? "chevronUp" : "chevronDown"} className="w-5 h-5 text-slate-400" />
                                        </button>
                                        {openFaq === i && <div className="p-6 pt-0 text-slate-600 border-t-2 border-slate-50 text-sm md:text-lg font-medium leading-relaxed">{faq.a}</div>}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    <footer className="py-12 bg-slate-950 text-center text-slate-500 px-4">
                        <p className="font-bold uppercase tracking-widest text-[10px] mb-4">© 2025 Protocolo Maternidade.</p>
                        <p className="text-[9px] max-w-2xl mx-auto uppercase leading-relaxed opacity-50 font-medium">Guia informativo para auxiliar mães na busca por seus direitos previdenciários.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
